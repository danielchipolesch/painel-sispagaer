# =============================================================================
# PAINEL SISPAGAER — Docker Compose para Desenvolvimento e Produção
#
# Serviços:
#   db       — MySQL 8.4 (Data Warehouse)
#   backend  — Quarkus REST API (porta 8080)
#   frontend — Vue 3 + Vite dev server (porta 5173)
#
# Produção: docker compose --profile production up -d
# Desenvolvimento: docker compose up
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Banco de dados — MySQL 8.4
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.4
    container_name: sispagaer-db
    environment:
      MYSQL_DATABASE: dw_sispagaer
      MYSQL_USER: sispagaer
      MYSQL_PASSWORD: changeme
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sispagaer", "-pchangeme"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - sispagaer-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend — Quarkus (build multi-stage a partir do Dockerfile.jvm)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: sispagaer-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: mysql://db:3306/dw_sispagaer
      DB_USERNAME: sispagaer
      DB_PASSWORD: changeme
      API_KEY: dev-only-key-troque-em-producao
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:80,http://localhost
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sispagaer-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — Vue 3 + Vite (desenvolvimento com hot-reload)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: sispagaer-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      # API_TARGET_URL é usada pelo servidor Vite (Node) para o proxy reverso
      # O browser sempre acessa via /api — o proxy Vite roteia para cá
      API_TARGET_URL: http://backend:8080
      VITE_API_KEY: dev-only-key-troque-em-producao
    depends_on:
      - backend
    networks:
      - sispagaer-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — Nginx (produção otimizada, perfil separado)
  # ---------------------------------------------------------------------------
  frontend-prod:
    build:
      context: ./frontend
      target: production
    container_name: sispagaer-frontend-prod
    ports:
      - "80:80"
    environment:
      NODE_ENV: production
    profiles:
      - production
    depends_on:
      - backend
    networks:
      - sispagaer-net
    restart: unless-stopped

volumes:
  db_data:

networks:
  sispagaer-net:
    driver: bridge
